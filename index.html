<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>찰떡궁합 룸메이트 테스트 | 당신의 운명적인 셰어하우스 메이트는?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        .hide { display: none !important; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased selection:bg-rose-200 selection:text-rose-900">

    <section id="quiz-section" class="min-h-screen flex items-center justify-center p-4 fade-in">
        <div class="max-w-lg w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
            <div id="intro-screen" class="p-8 text-center">
                <div class="mb-6 inline-block p-4 bg-rose-50 rounded-full">
                    <svg class="w-12 h-12 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                </div>
                <h1 class="text-2xl md:text-3xl font-black text-slate-900 mb-4 tracking-tight">나와 찰떡궁합인<br><span class="text-rose-500">위험한 룸메이트</span> 찾기</h1>
                <p class="text-slate-500 mb-8 leading-relaxed">평화로운 셰어하우스에 입주하게 된 당신.<br>과연 4명의 매력적인 남자들 중, 당신의 심장을 뛰게 할 단 한 명의 메이트는 누구일까요?</p>
                <button onclick="startQuiz()" class="w-full bg-slate-900 hover:bg-rose-500 text-white font-bold py-4 px-8 rounded-xl transition-colors duration-300 shadow-lg shadow-slate-200">
                    테스트 시작하기
                </button>
            </div>

            <div id="question-screen" class="p-8 hide">
                <div class="w-full bg-slate-100 rounded-full h-2 mb-6">
                    <div id="progress-bar" class="bg-rose-500 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
                <h2 id="question-text" class="text-xl md:text-2xl font-bold text-slate-900 mb-8 leading-snug min-h-[5rem]"></h2>
                <div class="space-y-4">
                    <button onclick="handleAnswer(0)" id="answer-a" class="w-full text-left bg-white border-2 border-slate-100 hover:border-rose-300 hover:bg-rose-50 text-slate-700 font-medium py-4 px-6 rounded-xl transition-all duration-200"></button>
                    <button onclick="handleAnswer(1)" id="answer-b" class="w-full text-left bg-white border-2 border-slate-100 hover:border-rose-300 hover:bg-rose-50 text-slate-700 font-medium py-4 px-6 rounded-xl transition-all duration-200"></button>
                </div>
            </div>
        </div>
    </section>

    <section id="result-section" class="hide fade-in min-h-screen bg-slate-50">
        <div class="md:flex md:min-h-screen max-w-6xl mx-auto bg-white md:shadow-2xl md:my-0">
            
            <div class="md:w-1/2 bg-slate-200 relative">
                <div class="aspect-square w-full md:h-screen md:sticky md:top-0">
                    <img id="char-image" src="" alt="캐릭터 일러스트" class="w-full h-full object-cover shadow-inner">
                </div>
            </div>

            <div class="md:w-1/2 p-6 md:p-12 lg:p-16 flex flex-col justify-center relative">
                <div class="mb-8">
                    <span class="inline-block py-1 px-3 rounded-full bg-rose-100 text-rose-600 text-sm font-bold tracking-wider mb-4">당신의 운명적인 메이트</span>
                    <h1 id="char-name" class="text-4xl md:text-5xl font-black text-slate-900 mb-2">캐릭터 이름</h1>
                    <p id="char-subtitle" class="text-xl text-slate-500 font-medium mb-6">서브 타이틀</p>
                    
                    <div id="char-tags" class="flex flex-wrap gap-2 mb-8">
                        </div>

                    <div class="prose prose-slate max-w-none">
                        <p id="char-desc" class="text-slate-600 leading-relaxed text-lg mb-6">캐릭터 상세 설명</p>
                        
                        <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100 mb-8">
                            <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-3">Secret Note</h3>
                            <p id="char-secret" class="text-slate-700 italic">"매력 포인트 대사"</p>
                        </div>
                    </div>
                </div>

                <div class="fixed bottom-0 left-0 w-full p-4 bg-white/90 backdrop-blur-sm border-t border-slate-100 md:relative md:bg-transparent md:border-none md:p-0 md:backdrop-blur-none z-50">
                    
                    <button id="chat-button" class="w-full bg-slate-900 hover:bg-rose-500 text-white font-bold py-4 px-8 rounded-xl transition-colors duration-300 shadow-xl shadow-slate-200/50 flex justify-center items-center gap-2 text-lg">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                        이 캐릭터와 대화하기
                    </button>
                    <button onclick="location.reload()" class="w-full mt-3 text-slate-400 hover:text-slate-600 font-medium py-2 text-sm text-center md:hidden">
                        테스트 다시하기
                    </button>
                </div>
                <button onclick="location.reload()" class="hidden md:block mt-6 text-slate-400 hover:text-slate-600 font-medium py-2 text-sm text-left transition-colors">
                    ↺ 테스트 다시하기
                </button>
            </div>
            
        </div>
    </section>

    <script>
        const questions = [
            {
                q: "금요일 저녁, 당신이 가장 선호하는 휴식 방법은?",
                a: { text: "조용히 방에서 넷플릭스나 게임을 즐긴다.", type: "I" },
                b: { text: "친구들을 만나거나 밖에서 에너지를 발산한다.", type: "E" }
            },
            {
                q: "룸메이트가 집안일 당번을 자꾸 잊어버린다면?",
                a: { text: "논리적으로 규칙을 상기시키며 단호하게 지적한다.", type: "T" },
                b: { text: "사정이 있었겠지 생각하며 부드럽게 대화로 푼다.", type: "F" }
            },
            {
                q: "당신이 생각하는 이상적인 스킨십의 온도는?",
                a: { text: "은근한 통제와 짜릿한 긴장감이 있는 어른스러운 분위기", type: "D" },
                b: { text: "서로 체온을 나누며 꼭 껴안고 교감하는 다정한 분위기", type: "S" }
            }
        ];

        // 캐릭터 데이터에 chatLink 추가
        const characters = {
            "한서진": {
                name: "한서진",
                subtitle: "게으른 천재형, 무심한 듯 다정한 나른함",
                tags: ["#INTP", "#연상", "#은근한_사디스트", "#츤데레"],
                image: "한서진.png",
                desc: "평소엔 방에 틀어박혀 게임만 하는 무심한 룸메이트. 당신에게 전혀 관심이 없는 줄 알았지만, 사실 당신의 아주 사소한 행동 하나까지 관찰하고 있습니다. 틱틱대면서도 당신이 원할 때는 결코 거절하지 않는, 은근한 통제욕이 매력적인 남자입니다.",
                secret: "\"귀찮게 진짜... 이리 와, 안아줄 테니까.\"",
                chatLink: "https://share.crack.wrtn.ai/tbeadf" // ⬅️ 한서진 링크 입력
            },
            "한서준": {
                name: "한서준",
                subtitle: "햇살 같은 대형견, 브레이크 없는 직진남",
                tags: ["#ESFP", "#동갑", "#체대생", "#대형견"],
                image: "한서준.png",
                desc: "셰어하우스의 분위기 메이커! 언제나 밝고 에너지가 넘치며, 당신에게 거침없이 애정을 표현합니다. 눈을 맞추며 해맑게 웃어주지만, 단 둘이 있을 때는 지치지 않는 체력으로 당신을 아찔하게 만드는 반전 매력의 소유자입니다.",
                secret: "\"나 진짜 참으려고 했는데, 네가 너무 예쁜 걸 어떡해.\"",
                chatLink: "https://share.crack.wrtn.ai/tbeadf" // ⬅️ 알려주신 한서준 링크
            },
            "이시혁": {
                name: "이시혁",
                subtitle: "차가운 원칙주의자 속, 숨겨진 과보호",
                tags: ["#ISTJ", "#동갑", "#로스쿨준비생", "#통제형다정"],
                image: "이시혁.png",
                desc: "잔소리가 끊이지 않는 철저한 원칙주의자. 겉으로는 차갑고 엄격해 보이지만, 그 모든 통제와 규칙의 기저에는 당신을 향한 지독한 걱정과 애정이 깔려 있습니다. 침대 위에서조차 단호한 규칙을 요구하는, 위험하고도 다정한 남자입니다.",
                secret: "\"쉿, 조용히 해. 밖에서 다 들어. ...참아. 못 참으면 멈출 거야.\"",
                chatLink: "https://share.crack.wrtn.ai/tbeadf" // ⬅️ 이시혁 링크 입력
            },
            "정다온": {
                name: "정다온",
                subtitle: "차분하고 나긋한, 온통 당신뿐인 순정파",
                tags: ["#INFJ", "#연하", "#실용음악과", "#정서적교감"],
                image: "정다온.png",
                desc: "나긋나긋한 목소리와 차분한 미소로 언제나 당신을 배려하는 연하남. 화내는 법이 없으며, 당신의 감정에 온전히 주파수를 맞춥니다. 당신의 품에 파고들며 체온을 나누는 것을 가장 좋아하는, 깊은 교감을 원한다면 완벽한 메이트입니다.",
                secret: "\"누나, 저 계속 안고 있어도 돼요? 떨어지기 싫어요...\"",
                chatLink: "https://share.crack.wrtn.ai/tbeadf" // ⬅️ 정다온 링크 입력
            }
        };

        let currentQuestionIndex = 0;
        let answers = { I:0, E:0, T:0, F:0, D:0, S:0 };

        function startQuiz() {
            document.getElementById('intro-screen').classList.add('hide');
            document.getElementById('question-screen').classList.remove('hide');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQuestionIndex];
            document.getElementById('question-text').innerText = `Q${currentQuestionIndex + 1}. ${q.q}`;
            document.getElementById('answer-a').innerText = q.a.text;
            document.getElementById('answer-b').innerText = q.b.text;
            
            // 프로그래스 바 업데이트
            const progress = ((currentQuestionIndex) / questions.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
        }

        function handleAnswer(choice) {
            const q = questions[currentQuestionIndex];
            const type = choice === 0 ? q.a.type : q.b.type;
            answers[type]++;

            currentQuestionIndex++;

            if (currentQuestionIndex < questions.length) {
                // 화면 전환 효과
                const qScreen = document.getElementById('question-screen');
                qScreen.classList.remove('fade-in');
                void qScreen.offsetWidth; // trigger reflow
                qScreen.classList.add('fade-in');
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            let resultChar = "";

            // 간단한 결과 도출 로직 (선택지 조합에 따라 캐릭터 매칭)
            if (answers.I > 0 && answers.T > 0) resultChar = "한서진";
            else if (answers.E > 0 && answers.F > 0) resultChar = "한서준";
            else if (answers.D > 0 && answers.T > 0) resultChar = "이시혁";
            else if (answers.S > 0 && answers.I > 0) resultChar = "정다온";
            else if (answers.E > 0 && answers.T > 0) resultChar = "이시혁"; // 보완용 
            else resultChar = "정다온"; // 기본값

            const charData = characters[resultChar];

            // 결과 화면 데이터 바인딩
            document.getElementById('char-image').src = charData.image;
            document.getElementById('char-name').innerText = charData.name;
            document.getElementById('char-subtitle').innerText = charData.subtitle;
            document.getElementById('char-desc').innerText = charData.desc;
            document.getElementById('char-secret').innerText = charData.secret;

            const tagsHtml = charData.tags.map(tag => 
                `<span class="bg-slate-100 text-slate-600 px-3 py-1 text-sm rounded-full font-medium">${tag}</span>`
            ).join('');
            document.getElementById('char-tags').innerHTML = tagsHtml;

            // 🚀 동적으로 버튼 클릭 이벤트(링크) 연결 🚀
            document.getElementById('chat-button').onclick = function() {
                location.href = charData.chatLink;
            };

            // 섹션 전환
            document.getElementById('quiz-section').classList.add('hide');
            document.getElementById('result-section').classList.remove('hide');
            document.getElementById('result-section').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
